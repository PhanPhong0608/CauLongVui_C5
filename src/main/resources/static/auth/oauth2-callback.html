<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang đăng nhập... – Cầu Lông Vui</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a1f0e 0%, #0f2d15 100%);
    }

    .callback-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    }

    .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid rgba(58,173,98,0.2);
      border-top-color: #3aad62;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 28px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .google-logo {
      font-size: 48px;
      margin-bottom: 16px;
      display: none;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
    }

    .error-card {
      display: none;
    }

    .error-card.show {
      display: block;
    }

    .btn-retry {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: #3aad62;
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-retry:hover {
      background: #2d8a4e;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="callback-card" id="loadingCard">
    <div class="spinner"></div>
    <h1>Đang xử lý đăng nhập...</h1>
    <p>Vui lòng chờ trong giây lát,<br>chúng tôi đang xác thực tài khoản Google của bạn.</p>
  </div>

  <div class="callback-card error-card" id="errorCard">
    <div style="font-size: 48px; margin-bottom: 16px;">❌</div>
    <h1>Đăng nhập thất bại</h1>
    <p id="errorMsg">Đã có lỗi xảy ra. Vui lòng thử lại.</p>
    <a href="/auth/login.html" class="btn-retry">Quay lại đăng nhập</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const error  = params.get('error');

    if (error) {
      showError(
        error === 'account_disabled'
          ? 'Tài khoản của bạn đã bị vô hiệu hóa. Vui lòng liên hệ hỗ trợ.'
          : 'Đăng nhập Google thất bại. Vui lòng thử lại.'
      );
    } else if (userId) {
      // Gọi API lấy thông tin user
      fetch(`/api/auth/me?id=${userId}`)
        .then(res => res.json())
        .then(json => {
          if (!json.success || !json.data) {
            showError('Không thể tải thông tin tài khoản.');
            return;
          }

          // Lưu user vào localStorage
          const user = json.data;
          localStorage.setItem('currentUser', JSON.stringify(user));

          // Redirect theo role
          if (user.role === 'ADMIN' || user.role === 'STAFF') {
            window.location.href = '/admin/court-management.html';
          } else {
            const redirect = sessionStorage.getItem('loginRedirect') || '/';
            sessionStorage.removeItem('loginRedirect');
            window.location.href = redirect;
          }
        })
        .catch(() => showError('Không thể kết nối đến máy chủ.'));
    } else {
      showError('Thông tin đăng nhập không hợp lệ.');
    }

    function showError(msg) {
      document.getElementById('loadingCard').style.display = 'none';
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorCard').classList.add('show');
    }
  </script>
</body>
</html>
